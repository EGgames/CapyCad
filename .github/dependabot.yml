version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: 'America/Montevideo'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '07:30'
      timezone: 'America/Montevideo'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
