name: Release Pipeline

on:
  push:
    branches: [test, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_release:
        description: "Forzar build multiplataforma"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:

  # ── 1. AUTO PR: test → main ──────────────────────────────────
  open-pr:
    name: Abrir PR a main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    steps:
      - uses: actions/checkout@v4

      - name: Crear PR si no existe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --base main --head test --state open --json number --jq 'length')
          if [ "$COUNT" = "0" ]; then
            gh pr create \
              --base main \
              --head test \
              --title "release: test -> main" \
              --body "PR automatico creado al actualizar la rama test. Hacer merge para disparar el build multiplataforma y crear la release." \
              --repo "$GITHUB_REPOSITORY"
            echo "PR creado."
          else
            echo "Ya existe un PR abierto (total: $COUNT). No se crea uno nuevo."
          fi

  # ── 2. VALIDAR (type-check + build) ──────────────────────────
  validate:
    name: Validar build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm --filter @capycad/web run type-check

      - name: Build web
        run: pnpm --filter @capycad/web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ── 3. BUILD MULTIPLATAFORMA ──────────────────────────────────
  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.os }}
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_release == true)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Build web renderer
        run: pnpm --filter @capycad/web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Instalar deps nativas Linux (AppImage)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y rpm fakeroot

      - name: Empaquetar Electron
        run: pnpm --filter @capycad/desktop build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir instalador
        uses: actions/upload-artifact@v4
        with:
          name: capycad-${{ matrix.platform }}-${{ github.ref_name }}
          path: apps/desktop/release/**/*
          if-no-files-found: error
          retention-days: 60

  # ── 4. CREAR GITHUB RELEASE ──────────────────────────────────
  release:
    name: Crear Release
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolver version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CapyCad ${{ steps.ver.outputs.tag }}"
          tag_name: ${{ steps.ver.outputs.tag }}
          draft: ${{ steps.ver.outputs.draft }}
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: artifacts/**/*
          generate_release_notes: true
          make_latest: true
