name: Release Pipeline

on:
  push:
    branches: [test]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Forzar build multiplataforma (crea draft release)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. AUTO PR: test → main ─────────────────────────────────────────
  open-pr:
    name: Abrir PR (test → main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    steps:
      - uses: actions/checkout@v4

      - name: Crear PR si no existe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --base main --head test --state open --json number --jq 'length')
          if [ "$COUNT" = "0" ]; then
            gh pr create \
              --base main \
              --head test \
              --title "release: test -> main" \
              --body "PR automático. Hacer merge para luego crear el tag y disparar el build multiplataforma." \
              --repo "$GITHUB_REPOSITORY" \
              || echo "::warning::No se pudo crear el PR."
          else
            echo "PR ya existe ($COUNT abiertos). Sin acción."
          fi

  # ── 2. VALIDAR (solo en PRs y ramas, no en tags) ────────────────────
  validate:
    name: Validar (type-check + build web)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @capycad/web run type-check

      - name: Build web
        run: pnpm --filter @capycad/web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ── 3. BUILD INSTALADORES (solo en tags o workflow_dispatch) ────────
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_release == true)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build web renderer
        run: pnpm --filter @capycad/web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Instalar dependencias nativas (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y rpm fakeroot libarchive-tools

      - name: Build instalador Electron
        run: pnpm --filter @capycad/desktop build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Listar artefactos generados
        shell: bash
        run: ls -lh apps/desktop/release/ || true

      - name: Subir artefacto (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: capycad-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
          if-no-files-found: error
          retention-days: 7

      - name: Subir artefacto (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: capycad-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 7

      - name: Subir artefacto (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: capycad-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
          if-no-files-found: error
          retention-days: 7

  # ── 4. CREAR GITHUB RELEASE ─────────────────────────────────────────
  release:
    name: Crear GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Listar artefactos descargados
        run: ls -lh artifacts/

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'CapyCad ${{ github.ref_name }}'
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') || contains(github.ref_name, '-') }}
          files: artifacts/*
          generate_release_notes: true
          make_latest: true
